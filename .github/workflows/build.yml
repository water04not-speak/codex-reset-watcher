name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify mock data
        run: npm run verify:mock

      - name: Verify sources
        run: npm run verify:sources

      - name: QA system test
        run: node scripts/qa-system-test.mjs

  build-tauri-windows:
    name: Build Tauri App (Windows)
    runs-on: windows-latest
    needs: lint-typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check

      - name: Cargo format check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test

      # Windows installers are unsigned in v0.3.x.
      # Build once; portable and NSIS must come from this same workspace output.
      - name: Build Tauri
        run: npm run tauri build

      - name: Stage current-version Windows release artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          Write-Host "Package version: $version"

          $portableSrc = "src-tauri/target/release/codex-reset-watcher.exe"
          if (-not (Test-Path $portableSrc)) {
            throw "Missing portable exe at $portableSrc (current build output)."
          }

          $nsisDir = "src-tauri/target/release/bundle/nsis"
          $nsisPattern = "codex-reset-watcher_${version}_x64-setup.exe"
          $nsisMatches = @(Get-ChildItem -Path $nsisDir -Filter $nsisPattern -ErrorAction SilentlyContinue)
          if ($nsisMatches.Count -ne 1) {
            $found = @(Get-ChildItem -Path $nsisDir -Filter "*.exe" -ErrorAction SilentlyContinue | ForEach-Object { $_.Name }) -join ", "
            throw "Expected exactly one NSIS installer matching $nsisPattern. Found: $found"
          }
          $nsisSrc = $nsisMatches[0].FullName

          # Reject historical / wrong-version installers from being staged.
          $otherNsis = @(Get-ChildItem -Path $nsisDir -Filter "*-setup.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -ne $nsisPattern })
          if ($otherNsis.Count -gt 0) {
            Write-Host "Note: other NSIS files exist in bundle dir but will not be uploaded:"
            $otherNsis | ForEach-Object { Write-Host " - $($_.Name)" }
          }

          $msiDir = "src-tauri/target/release/bundle/msi"
          $msiFiles = @(Get-ChildItem -Path $msiDir -Filter "*.msi" -ErrorAction SilentlyContinue)
          if ($msiFiles.Count -gt 0) {
            Write-Host "MSI artifacts present but intentionally excluded from ordinary-user Release uploads."
          }

          $stage = "release-stage"
          if (Test-Path -LiteralPath $stage) {
            Remove-Item -LiteralPath $stage -Recurse -Force
          }
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item -Force $portableSrc (Join-Path $stage "codex-reset-watcher.exe")
          Copy-Item -Force $nsisSrc (Join-Path $stage $nsisPattern)

          $portableHash = (Get-FileHash (Join-Path $stage "codex-reset-watcher.exe") -Algorithm SHA256).Hash
          $nsisHash = (Get-FileHash (Join-Path $stage $nsisPattern) -Algorithm SHA256).Hash
          $portableInfo = (Get-Item (Join-Path $stage "codex-reset-watcher.exe")).VersionInfo

          Write-Host "PORTABLE_SHA256=$portableHash"
          Write-Host "NSIS_SETUP_SHA256=$nsisHash"
          Write-Host "PORTABLE_FILEVERSION=$($portableInfo.FileVersion)"

          if ($portableInfo.FileVersion -notlike "$version*") {
            throw "Portable FileVersion '$($portableInfo.FileVersion)' does not match package version $version"
          }

          # Staged Release assets: portable + current-version NSIS only.
          $staged = @(Get-ChildItem $stage -File | ForEach-Object { $_.Name })
          Write-Host "Staged assets: $($staged -join ', ')"
          if ($staged.Count -ne 2) {
            throw "Expected exactly 2 staged assets (portable + NSIS)."
          }

          # Record hashes for release notes / audit (no secrets).
          @(
            "version=$version"
            "portable=codex-reset-watcher.exe"
            "portable_sha256=$portableHash"
            "portable_fileversion=$($portableInfo.FileVersion)"
            "nsis=$nsisPattern"
            "nsis_sha256=$nsisHash"
            "note=portable and nsis-setup come from the same tauri build workspace. Tauri patches the PE with bundle-type metadata per target, so the installed exe SHA256 may differ from the portable exe even when FileVersion matches. Do not promise byte-identical hashes."
          ) | Set-Content -Path (Join-Path $stage "artifact-manifest.txt") -Encoding utf8

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-reset-watcher-windows
          if-no-files-found: error
          path: |
            release-stage/codex-reset-watcher.exe
            release-stage/codex-reset-watcher_*_x64-setup.exe
            release-stage/artifact-manifest.txt

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-tauri-windows
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: codex-reset-watcher-windows
          path: release-artifacts

      - name: Verify release asset set
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag version: $VERSION"
          ls -la release-artifacts

          PORTABLE="release-artifacts/codex-reset-watcher.exe"
          NSIS="release-artifacts/codex-reset-watcher_${VERSION}_x64-setup.exe"

          test -f "$PORTABLE" || { echo "Missing portable exe"; exit 1; }
          test -f "$NSIS" || { echo "Missing NSIS setup for $VERSION"; exit 1; }

          # Fail if unexpected binaries are present (historical mix-in).
          mapfile -t EXES < <(find release-artifacts -type f -name '*.exe' | sort)
          echo "Exe assets:"
          printf '%s\n' "${EXES[@]}"

          if [ "${#EXES[@]}" -ne 2 ]; then
            echo "Expected exactly 2 exe assets (portable + NSIS), found ${#EXES[@]}"
            exit 1
          fi

          if find release-artifacts -type f -name '*.msi' | grep -q .; then
            echo "MSI must not be uploaded to Release"
            exit 1
          fi

          # Reject any setup whose filename version does not match the tag.
          while IFS= read -r setup; do
            base="$(basename "$setup")"
            case "$base" in
              "codex-reset-watcher_${VERSION}_x64-setup.exe") ;;
              *)
                echo "Unexpected setup asset: $base"
                exit 1
                ;;
            esac
          done < <(find release-artifacts -type f -name '*-setup.exe')

          cat release-artifacts/artifact-manifest.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/codex-reset-watcher.exe
            release-artifacts/codex-reset-watcher_*_x64-setup.exe
            release-artifacts/artifact-manifest.txt
